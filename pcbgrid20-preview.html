<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>pcbgrid20 preview</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
  body { display: flex; flex-direction: column; }
  header { padding: 6px 12px; background: #eee; border-bottom: 1px solid #ccc; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  header a { color: #06c; cursor: pointer; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  header .spacer { flex: 1; }
  header input.title { font-size: 13px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; width: 260px; }
  header button { font-size: 13px; padding: 3px 10px; }

  main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #preview { flex: 1 1 0; overflow: auto; padding: 10px; background: #fff; border-bottom: 1px solid #ccc; min-height: 0; }
  #preview svg { display: block; }
  #src { flex: 1 1 0; min-height: 0; width: 100%; box-sizing: border-box; border: 0; padding: 10px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; resize: none; outline: none; }
  .pane-label { padding: 4px 10px; font-size: 12px; background: #f6f6f6; border-bottom: 1px solid #ddd; color: #555; }

  /* index page */
  #index { padding: 20px 24px; overflow: auto; }
  #index h1 { font-size: 18px; margin: 0 0 12px 0; }
  #index ul { list-style: none; padding: 0; margin: 0 0 16px 0; }
  #index li { padding: 6px 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
  #index li a { color: #06c; text-decoration: none; flex: 1; cursor: pointer; }
  #index li a:hover { text-decoration: underline; }
  #index li .meta { color: #888; font-size: 12px; }
  #index li button { font-size: 12px; }
  #index .empty { color: #888; font-style: italic; }
  #index button.new { font-size: 14px; padding: 6px 14px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
"use strict";

/* ---------- Renderer (SVG) ---------- */

const W = 720, H = 450;
const GRID = 30;
const FW = 9, FH = 15;

function escXml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;"
  }[c]));
}

function render(text) {
  const out = [];
  out.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);
  out.push(`<rect width="${W}" height="${H}" fill="#c0ffff"/>`);

  const dots = [];
  for (let x = 0; x < W; x += GRID)
    for (let y = 0; y < H; y += GRID)
      dots.push(`M${x},${y}h2v2h-2z`);
  out.push(`<path fill="#f00" d="${dots.join("")}"/>`);

  const strList = [];
  const strUpList = [];
  let px = 0, py = 0, vx = 0, vy = 0;

  for (const raw of text.split(/\r\n|\r|\n/)) {
    if (/^\//.test(raw)) continue;
    if (/^#/.test(raw)) continue;
    const line = raw.split("#")[0];

    let m;
    if (m = line.match(/^\*\*[ \t]*(\d+),(\d+)([ltrbud])(\d+),(\d+),(\d+)/)) {
      const gx = +m[2], gy = +m[1], dir = m[3];
      const len = +m[4], lw = +m[5], rw = +m[6];
      px = gx * GRID;
      py = (14 - gy) * GRID;
      let l = px, r = px, t = py, b = py;
      vx = 0; vy = 0;
      switch (dir) {
        case "l": b += (len - 1) * GRID; r += lw * GRID; l -= rw * GRID; vy = GRID; break;
        case "t": case "u": l -= (len - 1) * GRID; b += lw * GRID; t -= rw * GRID; vx = -GRID; break;
        case "r": t -= (len - 1) * GRID; l -= lw * GRID; r += rw * GRID; vy = -GRID; break;
        case "b": case "d": r += (len - 1) * GRID; t -= lw * GRID; b += rw * GRID; vx = GRID; break;
      }
      l -= 15; t -= 15; r += 15; b += 15;
      out.push(`<rect x="${l}" y="${t}" width="${r - l}" height="${b - t}" fill="none" stroke="#f00" stroke-width="2"/>`);
      continue;
    }

    if (m = line.match(/^\*\*[ \t]*(\d+),(\d+)qr/)) {
      const gx = +m[2], gy = +m[1];
      strUpList.push({ x: gx * GRID, y: (14 - gy) * GRID, text: "[QR omitted]" });
      continue;
    }

    const mm = line.match(/^([^ \t]*)(?:[ \t]+(.*))?$/);
    if (!mm) continue;
    const pinname = mm[1];
    let s = (mm[2] || "").trim();
    if (!pinname && !s) continue;

    if (pinname) {
      const w2 = pinname.length * (FW / 2 | 0);
      if (vx) strList.push({ x: px - w2, y: py - 8, text: pinname });
      else    strUpList.push({ x: px - 8, y: py + w2, text: pinname });
    }

    let x = px, y = py;
    let lastdir = "";
    const stack = [];

    while (s) {
      const c = s[0];
      s = s.slice(1);

      if (c === "<" || c === "{") {
        const bm = s.match(/^([^>}]*)([>}]*)(.*)$/);
        s = bm[3];
        const label = (bm[1] || "").trim();
        const v = bm[2].length * GRID;

        let sx = x, sy = y, ex = x, ey = y, wx = 0, wy = 0;
        let box = null;
        switch (lastdir) {
          case "4": {
            ey += (wy = v) - GRID; sy -= GRID;
            const t = sy + 8, b = ey - 8, l = sx - 8, r = sx + 8;
            box = [[sx, sy, l, t], [l, t, l, b], [l, b, ex, ey],
                   [sx, sy, r, t], [r, t, r, b], [r, b, ex, ey]];
            break;
          }
          case "8": {
            ex += (wx = -v) + GRID; sx += GRID;
            const t = sy - 8, b = sy + 8, l = ex + 8, r = sx - 8;
            box = [[sx, sy, r, t], [r, t, l, t], [l, t, ex, ey],
                   [sx, sy, r, b], [r, b, l, b], [l, b, ex, ey]];
            break;
          }
          case "6": {
            ey += (wy = -v) + GRID; sy += GRID;
            const t = ey + 8, b = sy - 8, l = sx - 8, r = sx + 8;
            box = [[sx, sy, l, b], [l, b, l, t], [l, t, ex, ey],
                   [sx, sy, r, b], [r, b, r, t], [r, t, ex, ey]];
            break;
          }
          case "2": {
            ex += (wx = v) - GRID; sx -= GRID;
            const t = sy - 8, b = sy + 8, l = sx + 8, r = ex - 8;
            box = [[sx, sy, l, t], [l, t, r, t], [r, t, ex, ey],
                   [sx, sy, l, b], [l, b, r, b], [r, b, ex, ey]];
            break;
          }
        }
        if (!box) continue;

        let d = "";
        for (const [x1, y1, x2, y2] of box) d += `M${x1},${y1}L${x2},${y2}`;
        out.push(`<path d="${d}" fill="none" stroke="#000" stroke-width="2"/>`);

        const w2 = label.length * (FW / 2 | 0);
        if (wx) strList.push({ x: sx - w2 + wx / 2, y: sy - 8, text: label });
        else    strUpList.push({ x: sx - 8, y: sy + w2 + wy / 2, text: label });

        x = ex; y = ey;
        continue;
      }

      const x0 = x, y0 = y;
      lastdir = c;
      let moved = true;
      switch (c) {
        case "(": stack.unshift([x, y]); moved = false; break;
        case ")": if (stack.length) { const p = stack.shift(); x = p[0]; y = p[1]; } moved = false; break;
        case "1": y += GRID; x += GRID; break;
        case "2": x += GRID; break;
        case "3": y -= GRID; x += GRID; break;
        case "4": y += GRID; break;
        case "6": y -= GRID; break;
        case "7": y += GRID; x -= GRID; break;
        case "8": x -= GRID; break;
        case "9": y -= GRID; x -= GRID; break;
        default: moved = false; break;
      }
      if (moved) {
        const nc = s[0];
        if (nc !== "<" && nc !== "{") {
          out.push(`<line x1="${x0}" y1="${y0}" x2="${x}" y2="${y}" stroke="#f00" stroke-width="8" stroke-linecap="round"/>`);
        }
      }
    }

    px += vx; py += vy;
  }

  for (const s of strList) {
    out.push(`<text x="${s.x}" y="${s.y + FH - 2}" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#000">${escXml(s.text)}</text>`);
  }
  for (const s of strUpList) {
    out.push(`<text transform="rotate(-90 ${s.x} ${s.y})" x="${s.x}" y="${s.y + FH - 2}" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#000">${escXml(s.text)}</text>`);
  }

  out.push(`</svg>`);
  return out.join("");
}

/* ---------- Storage ---------- */

const STORAGE_KEY = "pcbgrid20-preview.files.v1";

const DEFAULT_CONTENT = `** 10,2qr

** 4,13t10,0,0
B8
A0
A1
B0
B1
B2
15
13
SC
B9

** 3,13t10,0,0
DA
G
G
5V
5V
3V3
A0
A1
SD
BT
`;

function loadAll() {
  try {
    const j = localStorage.getItem(STORAGE_KEY);
    if (!j) return {};
    return JSON.parse(j) || {};
  } catch (e) { return {}; }
}
function saveAll(all) { localStorage.setItem(STORAGE_KEY, JSON.stringify(all)); }

function loadFile(id) { return loadAll()[id] || null; }
function saveFile(id, patch) {
  const all = loadAll();
  const cur = all[id] || { id, title: "", content: "", createdAt: Date.now() };
  all[id] = Object.assign(cur, patch, { updatedAt: Date.now() });
  saveAll(all);
  return all[id];
}
function deleteFile(id) {
  const all = loadAll();
  delete all[id];
  saveAll(all);
}
function newId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function createFile() {
  const id = newId();
  const all = loadAll();
  const n = Object.keys(all).length + 1;
  const f = { id, title: `pcbgrid ${n}`, content: DEFAULT_CONTENT, createdAt: Date.now(), updatedAt: Date.now() };
  all[id] = f;
  saveAll(all);
  return f;
}

/* ---------- Routing ---------- */

function currentRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("f/")) return { name: "file", id: h.slice(2) };
  return { name: "index" };
}
function go(hash) { location.hash = hash; }

window.addEventListener("hashchange", route);
document.addEventListener("DOMContentLoaded", route);

function route() {
  const r = currentRoute();
  if (r.name === "file") {
    const f = loadFile(r.id);
    if (!f) { go(""); return; }
    renderEditor(f);
  } else {
    renderIndex();
  }
}

/* ---------- Views ---------- */

function fmtDate(t) {
  if (!t) return "";
  const d = new Date(t);
  const p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function renderIndex() {
  const all = loadAll();
  const files = Object.values(all).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  const app = document.getElementById("app");
  app.innerHTML = `
    <div id="index">
      <h1>pcbgrid20 preview</h1>
      <p><button class="new" id="new-btn">+ 新しい pcbgrid</button></p>
      ${files.length === 0
        ? `<p class="empty">まだファイルがありません。上のボタンで作成してください。</p>`
        : `<ul>${files.map(f => `
            <li>
              <a data-id="${f.id}">${escXml(f.title || "(無題)")}</a>
              <span class="meta">${fmtDate(f.updatedAt)}</span>
              <button data-del="${f.id}">削除</button>
            </li>`).join("")}</ul>`}
    </div>`;
  document.getElementById("new-btn").addEventListener("click", () => {
    const f = createFile();
    go(`f/${f.id}`);
  });
  app.querySelectorAll("a[data-id]").forEach(a => {
    a.addEventListener("click", () => go(`f/${a.dataset.id}`));
  });
  app.querySelectorAll("button[data-del]").forEach(b => {
    b.addEventListener("click", () => {
      if (confirm("このファイルを削除しますか?")) {
        deleteFile(b.dataset.del);
        renderIndex();
      }
    });
  });
}

function renderEditor(f) {
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <a id="back-link">← 一覧</a>
      <input class="title" id="title" value="${escXml(f.title)}">
      <span class="spacer"></span>
      <span id="status" style="color:#888;font-size:12px">保存済み</span>
    </header>
    <main>
      <div class="pane-label">preview</div>
      <div id="preview"></div>
      <div class="pane-label">input</div>
      <textarea id="src" spellcheck="false"></textarea>
    </main>`;

  const titleEl = document.getElementById("title");
  const srcEl = document.getElementById("src");
  const previewEl = document.getElementById("preview");
  const statusEl = document.getElementById("status");
  srcEl.value = f.content;

  function update() { previewEl.innerHTML = render(srcEl.value); }
  function markSaved() { statusEl.textContent = "保存済み"; }
  function markDirty() { statusEl.textContent = "保存中…"; }

  update();

  srcEl.addEventListener("input", () => {
    markDirty();
    saveFile(f.id, { content: srcEl.value });
    update();
    markSaved();
  });
  titleEl.addEventListener("input", () => {
    markDirty();
    saveFile(f.id, { title: titleEl.value });
    markSaved();
  });
  document.getElementById("back-link").addEventListener("click", () => go(""));
}
</script>
</body>
</html>
